services:
  altivec-intelligence:
    image: ghcr.io/jeffreybergier/altivec-intelligence:latest
    stdin_open: true
    tty: true
    env_file:
      - ~/Developer/Strappy-Fleet/.env
    environment:
      - IS_SANDBOX=1
    volumes:
      - ~/.altivec:/root
      - ~/Developer/Strappy-Fleet/AGENTS.md:/repo/AGENTS.md
      - ~/Developer/Strappy-Fleet/skills:/repo/skills
      - ~/Developer/Strappy-Fleet/source:/repo/strappy-fleet
      - ~/Developer/Backups:/repo/backups
      - ~/Developer/Vibing:/repo/checkouts
    working_dir: /repo
    entrypoint: /bin/bash
    command: -lc "altivec-chooser"

  strappy:
    image: ghcr.io/jeffreybergier/altivec-intelligence:latest
    stdin_open: true
    tty: true
    env_file:
      - ~/Developer/Strappy-Fleet/.env
    volumes:
      - ~/.altivec:/root
      - ~/Developer/Strappy-Fleet/source:/repo/strappy-fleet
      - ~/Developer/Backups:/repo/backups
      - ~/Developer/Vibing:/repo/checkouts
    working_dir: /repo/strappy-fleet
    entrypoint: /bin/bash -lc 'npm install --no-fund --no-audit --loglevel=error >/dev/null && exec npm run --silent strappy -- "$@"' bash

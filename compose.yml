services:
  altivec-intelligence:
    image: ghcr.io/jeffreybergier/altivec-intelligence:latest
    stdin_open: true
    tty: true
    environment:
      - IS_SANDBOX=1
    volumes:
      - ~/.strappy:/root
      - ./source:/repo/source
      - ./backups:/repo/backups
      - ./checkouts:/repo/checkouts
    working_dir: /repo/source
    entrypoint: /bin/bash
    command: -lc "altivec-chooser"

  shell:
    image: ghcr.io/jeffreybergier/altivec-intelligence:latest
    volumes:
      - ~/.strappy:/root
      - ./source:/repo/source
      - ./backups:/repo/backups
      - ./checkouts:/repo/checkouts
    working_dir: /repo/source

  strappy:
    image: ghcr.io/jeffreybergier/altivec-intelligence:latest
    stdin_open: true
    tty: true
    volumes:
      - ~/.strappy:/root
      - ./source:/repo/source
      - ./backups:/repo/backups
      - ./checkouts:/repo/checkouts
    working_dir: /repo/source
    entrypoint: /bin/bash -lc 'npm install --no-fund --no-audit && exec npm run --silent strappy -- "$@"' bash
